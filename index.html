<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Economic Signal Dashboard — July 14, 2026</title>
<style>
  :root{
    --clear-bg:#f0faf4; --clear-c:#1e7c45; --clear-b:#a8dfc0; --clear-d:#27ae60;
    --watch-bg:#fffbf0; --watch-c:#b7650a; --watch-b:#f5d99a; --watch-d:#f39c12;
    --alert-bg:#fff0f0; --alert-c:#c0392b; --alert-b:#f5aaaa; --alert-d:#e24b4b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#f8f9fa;}
  body{font-family:Arial,Helvetica,sans-serif;color:#1a1a2e;}
  .wrap{padding:18px;max-width:1100px;margin:0 auto;}
  .hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .kicker{font-size:11px;color:#6366f1;letter-spacing:.12em;font-weight:700;text-transform:uppercase;margin-bottom:3px;}
  .title{font-size:20px;font-weight:700;}
  .rt{text-align:right;}
  .rt .lbl{font-size:11px;color:#888;}
  .rt .val{font-size:13px;color:#444;font-weight:600;}

  .card{background:#fff;border:1px solid #dee2e6;border-radius:8px;}
  .read{margin-bottom:12px;border-left:4px solid #6366f1;border-radius:8px;padding:11px 14px;background:#fff;border:1px solid #dee2e6;border-left:4px solid #6366f1;}
  .read-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:4px;}
  .read-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#4f46e5;}
  .read-sub{font-size:10px;color:#aaa;}
  .chain{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f1f3f5;}
  .chain:last-of-type{border-bottom:none;}
  .chain .dot{flex-shrink:0;width:7px;height:7px;border-radius:50%;margin-top:5px;}
  .chain .q{font-size:12.5px;color:#222;}
  .chain .where{color:#999;font-size:11px;}
  .chain .ans{font-size:12px;font-weight:600;margin:1px 0;}
  .chain .det{font-size:11px;color:#777;line-height:1.45;}
  .bottom{margin-top:9px;padding:8px 11px;background:#f5f5ff;border:1px solid #d9d9f5;border-radius:6px;font-size:12px;color:#2a2a5a;line-height:1.5;}
  .bottom strong{color:#4f46e5;}

  .decision{margin-bottom:16px;padding:9px 13px;background:var(--alert-bg);border:1px solid #f5c6c6;border-left:4px solid var(--alert-d);border-radius:6px;font-size:12px;color:#7a1a1a;}
  .decision strong{color:var(--alert-c);}

  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .tile{border-radius:8px;padding:12px 14px;text-align:center;border:1px solid;}
  .tile .n{font-size:28px;font-weight:700;line-height:1;}
  .tile .t{font-size:11px;font-weight:600;margin-top:3px;letter-spacing:.05em;}
  .bar{margin-top:7px;background:rgba(0,0,0,.08);border-radius:4px;height:4px;overflow:hidden;}
  .bar > div{height:100%;border-radius:4px;}

  .tabs{display:flex;gap:4px;background:#e9ecef;border-radius:8px;padding:4px;margin-bottom:14px;}
  .tabbtn{flex:1;padding:7px 0;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:transparent;color:#888;}
  .tabbtn.active{background:#fff;color:#3b5bdb;box-shadow:0 1px 4px rgba(0,0,0,.1);}
  .panel{display:none;}
  .panel.active{display:block;}

  .note{margin-bottom:10px;padding:9px 13px;border-radius:6px;font-size:12px;line-height:1.5;}
  .note-green{background:var(--clear-bg);border:1px solid var(--clear-b);border-left:4px solid var(--clear-c);color:#1a4a2a;}
  .note-green strong.h{color:var(--clear-c);}

  .spot{padding:11px 14px;border-radius:8px;margin-bottom:10px;border:1px solid;}
  .spot .lab{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
  .spot .badge{font-size:9px;background:var(--alert-d);color:#fff;padding:1px 6px;border-radius:3px;font-weight:700;margin-left:8px;vertical-align:middle;}
  .spot .mgrid{display:grid;gap:8px;margin-top:8px;}
  .spot .mnote{margin-top:8px;font-size:11px;color:#666;line-height:1.5;}
  .mtile{background:#fff;border-radius:6px;padding:9px 11px;border:1px solid #e9ecef;}
  .mtile .ml{font-size:10px;color:#888;margin-bottom:3px;}
  .mtile .mv{font-size:20px;font-weight:700;line-height:1;}
  .mtile .ms{font-size:10px;color:#888;margin-top:3px;}

  details.sec{margin-bottom:8px;background:#fff;border:1px solid #dee2e6;border-radius:8px;overflow:hidden;}
  details.sec > summary{list-style:none;cursor:pointer;padding:10px 14px;background:#f8f9fa;display:flex;align-items:center;justify-content:space-between;}
  details.sec > summary::-webkit-details-marker{display:none;}
  details.sec[open] > summary{border-bottom:1px solid #dee2e6;}
  .sec-title{font-weight:700;font-size:12px;letter-spacing:.05em;color:#444;text-transform:uppercase;}
  .sec-pills{display:flex;align-items:center;gap:5px;}
  .pill{font-size:11px;border-radius:4px;padding:1px 7px;font-weight:700;border:1px solid;}
  .chev{color:#aaa;font-size:16px;margin-left:4px;display:inline-block;transition:transform .2s;}
  details.sec[open] .chev{transform:rotate(90deg);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  .tblwrap{overflow-x:auto;}
  th{text-align:left;padding:6px 12px;color:#888;font-weight:600;font-size:11px;white-space:nowrap;background:#f8f9fa;text-transform:uppercase;letter-spacing:.04em;}
  td{padding:8px 12px;white-space:nowrap;}
  tbody tr{border-bottom:1px solid #f1f3f5;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#f8f9fa;}
  .ind{color:#222;font-weight:500;white-space:normal;}
  .val{color:#1a1a2e;font-weight:700;}
  .prev{color:#888;font-size:12px;}
  .dir{color:#555;font-size:12px;}
  .upd{margin-left:6px;font-size:9px;background:var(--alert-d);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;}
  .rowdetail{display:none;font-size:10px;color:#aaa;margin-top:2px;white-space:normal;}
  tbody tr:hover .rowdetail{display:block;}

  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 7px;border-radius:4px;white-space:nowrap;border:1px solid;}
  .badge .bd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

  .chartcard{margin-top:16px;padding:12px 14px;}
  .chart-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
  .chart-sub{font-size:11px;color:#aaa;margin-bottom:8px;}
  .chart-leg{display:flex;gap:16px;margin-bottom:6px;font-size:11px;}
  .curveread{margin-top:8px;padding:6px 10px;background:var(--clear-bg);border:1px solid var(--clear-b);border-radius:6px;font-size:11px;color:#1a4a2a;}

  .cal-row{display:flex;align-items:center;gap:12px;padding:9px 13px;background:#fff;border:1px solid #dee2e6;border-radius:6px;margin-bottom:6px;}
  .cal-date{min-width:52px;font-size:11px;color:#888;font-weight:700;}
  .cal-name{flex:1;font-size:13px;color:#333;}
  .cal-pri{font-size:9px;padding:2px 8px;border-radius:4px;font-weight:700;white-space:nowrap;border:1px solid;}

  .gloss-grp{margin-bottom:8px;background:#fff;border:1px solid #dee2e6;border-radius:8px;overflow:hidden;}
  .gloss-cat{padding:8px 14px;background:#f8f9fa;border-bottom:1px solid #dee2e6;font-weight:700;font-size:12px;letter-spacing:.05em;color:#444;text-transform:uppercase;}
  .gloss-item{display:flex;gap:12px;padding:8px 14px;border-bottom:1px solid #f1f3f5;}
  .gloss-item:last-child{border-bottom:none;}
  .gloss-term{min-width:88px;font-weight:700;color:#1a1a2e;font-size:13px;flex-shrink:0;}
  .gloss-def{flex:1;font-size:12px;color:#555;line-height:1.5;}
  .gloss-def strong{color:#333;font-weight:600;}
  .gloss-intro{margin-bottom:10px;padding:9px 13px;background:#f5f8ff;border:1px solid #b3c6f5;border-left:4px solid #3b5bdb;border-radius:6px;font-size:12px;color:#1a2a5a;}
  .gloss-intro strong{color:#3b5bdb;}

  .foot{margin-top:14px;font-size:10px;color:#bbb;text-align:center;border-top:1px solid #dee2e6;padding-top:10px;}
  .foot .disc{margin-top:6px;color:#ccc;}
</style>
</head>

  {category:"Markets & Valuation",items:[
    {term:"S&P 500",full:"Standard & Poor's 500",def:"index of 500 large U.S. companies — the main U.S. equity benchmark."},
    {term:"P/E",full:"Price-to-Earnings ratio",def:"share price divided by earnings per share; moves in 'turns,' not bps."},
    {term:"fwd P/E",full:"forward P/E",def:"P/E based on expected earnings over the next 12 months."},
    {term:"CAPE",full:"Cyclically Adjusted P/E (Shiller P/E)",def:"price over 10-yr average inflation-adjusted earnings; smooths out the business cycle."},
    {term:"VIX",full:"Cboe Volatility Index",def:"expected 30-day S&P 500 volatility — the market's \"fear gauge.\""},
    {term:"ETF",full:"Exchange-Traded Fund",def:"a basket of securities that trades on an exchange like a single stock."},
    {term:"SMH",full:"VanEck Semiconductor ETF (ticker)",def:"used here as a shorthand proxy for the chip-stock sector."},
  ]},
  {category:"Credit & Financial Stress",items:[
    {term:"HY",full:"High Yield",def:"below-investment-grade (\"junk\") corporate bonds; spread measured over maturity-matched Treasuries."},
    {term:"IG",full:"Investment Grade",def:"higher-quality corporate bonds rated BBB-/Baa3 or above."},
    {term:"FINRA",full:"Financial Industry Regulatory Authority",def:"brokerage-industry regulator; the source of the margin-debt figures."},
  ]},
  {category:"Commodities & Global",items:[
    {term:"WTI",full:"West Texas Intermediate",def:"the U.S. benchmark crude oil grade."},
    {term:"Brent",full:"Brent crude (North Sea)",def:"the international benchmark crude oil grade (not an acronym)."},
    {term:"OPEC+",full:"Org. of the Petroleum Exporting Countries, plus allies",def:"oil-producing bloc (OPEC plus partners such as Russia) that coordinates output."},
    {term:"b/d",full:"barrels per day",def:"standard unit for oil production or consumption."},
    {term:"LNG",full:"Liquefied Natural Gas",def:"natural gas cooled to liquid form for shipping by sea."},
    {term:"BIS",full:"Bank for International Settlements",def:"the \"central bank for central banks\"; publishes global financial-stability research."},
    {term:"Kospi",full:"Korea Composite Stock Price Index",def:"South Korea's main stock index — chip-heavy, hence relevant to semis."},
  ]},
  {category:"Data Sources",items:[
    {term:"BLS",full:"Bureau of Labor Statistics",def:"official source for jobs (NFP) and CPI data."},
    {term:"BEA",full:"Bureau of Economic Analysis",def:"official source for GDP and PCE data."},
  ]},
];

/* ---------- HELPERS ---------- */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function countAll(){
  const all=Object.values(SIGNALS).flat();
  return {clear:all.filter(r=>r.signal==="clear").length,watch:all.filter(r=>r.signal==="watch").length,alert:all.filter(r=>r.signal==="alert").length,total:all.length};
}
function badge(type){
  const s=SIG[type];
  return `<span class="badge" style="background:${s.bg};color:${s.c};border-color:${s.b};"><span class="bd" style="background:${s.d};"></span>${type.toUpperCase()}</span>`;
}

/* ---------- RENDER: READ BANNER ---------- */
function renderRead(){
  const rows=TAKEAWAY.chain.map(c=>`
    <div class="chain">
      <span class="dot" style="background:${SIG[c.tone].d};"></span>
      <div style="flex:1;">
        <div class="q"><strong>${esc(c.n)}. ${esc(c.q)}</strong> <span class="where">(${esc(c.where)})</span></div>
        <div class="ans" style="color:${SIG[c.tone].c};">${esc(c.answer)}</div>
        <div class="det">${esc(c.detail)}</div>
      </div>
    </div>`).join("");
  return `<div class="read">
    <div class="read-top"><span class="read-h">📋 The Read</span><span class="read-sub">growth → inflation → Fed / rates / risk · ${esc(TAKEAWAY.updated)}</span></div>
    ${rows}
    <div class="bottom"><strong>Bottom line:</strong> ${esc(TAKEAWAY.bottomLine)}</div>
  </div>`;
}

/* ---------- RENDER: DECISION + TILES ---------- */
function renderDecision(counts){
  return `<div class="decision"><strong>⚠ Decision Rule:</strong> If 3+ signals turn red → consider reducing equity exposure. &nbsp;
    <strong>Currently: ${counts.alert} alerts — down 1 from 11 as June CPI cooled sharply (3.5% headline, 2.6% core), pulling the CPI signal off red and collapsing July hike odds to ~17%. The remaining reds: still-hot PCE/PPI, the 30yr above 5%, an elevated Sept hike (~60%), stretched valuations, and the oil-driven Iran risk. PPI lands tomorrow.</strong></div>`;
}
function renderTiles(counts){
  const items=[["Clear",counts.clear,"clear"],["Watch",counts.watch,"watch"],["Alert",counts.alert,"alert"]];
  return `<div class="tiles">${items.map(([lbl,n,k])=>{
    const s=SIG[k];
    return `<div class="tile" style="background:${s.bg};border-color:${s.b};">
      <div class="n" style="color:${s.c};">${n}</div>
      <div class="t" style="color:${s.c};">${lbl.toUpperCase()} / ${counts.total}</div>
      <div class="bar"><div style="width:${(n/counts.total*100).toFixed(1)}%;background:${s.d};"></div></div>
    </div>`;
  }).join("")}</div>`;
}

/* ---------- RENDER: SECTIONS ---------- */
function sectionPills(rows){
  const c={clear:rows.filter(r=>r.signal==="clear").length,watch:rows.filter(r=>r.signal==="watch").length,alert:rows.filter(r=>r.signal==="alert").length};
  let out="";
  if(c.alert>0) out+=`<span class="pill" style="background:var(--alert-bg);color:var(--alert-c);border-color:var(--alert-b);">${c.alert} 🔴</span>`;
  if(c.watch>0) out+=`<span class="pill" style="background:var(--watch-bg);color:var(--watch-c);border-color:var(--watch-b);">${c.watch} 🟡</span>`;
  if(c.clear>0) out+=`<span class="pill" style="background:var(--clear-bg);color:var(--clear-c);border-color:var(--clear-b);">${c.clear} 🟢</span>`;
  return out;
}
function renderRowsTable(rows){
  const body=rows.map(r=>`
    <tr>
      <td class="ind">${esc(r.name)}${r.upd?'<span class="upd">UPDATED</span>':''}
        <div class="rowdetail">Watch: ${esc(r.watch)}</div>
      </td>
      <td class="val">${esc(r.value)}</td>
      <td class="prev">${esc(r.prev)}</td>
      <td class="dir">${esc(r.dir)}</td>
      <td>${badge(r.signal)}</td>
    </tr>`).join("");
  return `<div class="tblwrap"><table>
    <thead><tr>
      <th>Indicator</th><th>Current</th><th>Prev (7/13)</th><th>Direction</th><th>Signal</th>
    </tr></thead>
    <tbody>${body}</tbody>
  </table></div>`;
}
function renderSections(){
  return Object.keys(SIGNALS).map(title=>{
    const rows=SIGNALS[title];
    const open=SECTION_OPEN[title]?"open":"";
    return `<details class="sec" ${open}>
      <summary>
        <span class="sec-title">${esc(title)}</span>
        <span class="sec-pills">${sectionPills(rows)}<span class="chev">›</span></span>
      </summary>
      ${renderRowsTable(rows)}
    </details>`;
  }).join("");
}

/* ---------- RENDER: SPOTLIGHTS ---------- */
function mtile(l,v,s,color){return `<div class="mtile"><div class="ml">${l}</div><div class="mv" style="color:${color};">${v}</div><div class="ms">${s}</div></div>`;}
function renderSpotlights(){
  const G="var(--clear-c)",R="var(--alert-c)",O="var(--watch-c)",GY="#555",B="#3b5bdb";
  return `
  <div class="note note-green"><strong class="h">📌 July 14 — CPI cools hard, but oil surges on the blockade:</strong> June CPI came in <strong>cool across the board</strong> — headline −0.4% MoM (biggest drop since Apr 2020), 3.5% YoY, and core 2.6%, all below forecasts. That <strong>collapsed July hike odds to ~17%</strong> (from 42%) and pulled yields down (2yr 4.18%, 10yr 4.55%). The catch: the US began <strong>enforcing the Hormuz blockade</strong> today and <strong>Brent pushed above $86</strong> — June predates all of it, so July's data may reverse the relief. Stocks ~flat (cool CPI vs. oil + IBM −22%). <strong>PPI tomorrow.</strong></div>

  <div class="spot" style="background:var(--clear-bg);border-color:var(--clear-b);border-left:4px solid var(--clear-c);">
    <div><span class="lab" style="color:var(--clear-c);">🎯 June CPI — Cool Across the Board</span><span class="badge">TODAY</span></div>
    <div class="mgrid" style="grid-template-columns:repeat(4,1fr);">
      ${mtile("Headline (MoM)","−0.4%","Biggest drop since Apr '20",G)}
      ${mtile("Headline (YoY)","3.5%","↓ from 4.2%; vs 3.8% exp",G)}
      ${mtile("Core (YoY)","2.6%","↓ from 2.9%; vs 2.9% exp",G)}
      ${mtile("July hike odds","~17%","↓ from 42% Monday",G)}
    </div>
    <div class="mnote">The relief the doves were waiting for. Headline CPI fell 0.4% on the month — the largest monthly decline since April 2020 — driven by a 5.7% drop in energy as June gasoline prices unwound. That took the annual rate to 3.5%, below the 3.8% expected. More importantly, CORE CPI (the number the Fed actually watches) was flat on the month and eased to 2.6% YoY, below the 2.9% forecast — a genuine step toward target, not just an energy effect. Markets repriced fast: July hike odds collapsed to ~17% from 42%, and the 2yr fell 8bps. The one caveat: this is June data, before the oil re-surge — so it's likely the trough. Source: BLS / CNBC, July 14, 2026.</div>
  </div>

  <div class="spot" style="background:var(--alert-bg);border-color:var(--alert-b);border-left:4px solid var(--alert-c);">
    <div><span class="lab" style="color:var(--alert-c);">⚠ The Catch — Oil Surges as the Blockade Is Enforced</span><span class="badge">TODAY</span></div>
    <div class="mgrid" style="grid-template-columns:repeat(3,1fr);">
      ${mtile("Brent crude","~$86","1-month high; +9.6% Mon",R)}
      ${mtile("Blockade","Enforced","+20% cargo fee at Hormuz",R)}
      ${mtile("Shows up in","July CPI","Released Aug 12",O)}
    </div>
    <div class="mnote">Working directly against the CPI relief: the US began enforcing its Strait of Hormuz blockade Tuesday afternoon — adding a 20% fee on all cargo crossing the strait — after a third straight night of strikes on Iran. Brent, which posted its biggest one-day jump in 6+ years Monday (+9.6%), pushed above $86, a one-month high. Because June CPI predates all of this, the energy relief in today's report is essentially backward-looking; the risk is that the surge feeds into the July CPI (out Aug 12) and, if it lingers, into core via shipping and input costs. This is why the inflation cluster stays mostly red even on a cool-CPI day, and why September hike odds held near 60%. Source: Yahoo Finance / Bloomberg, July 14, 2026.</div>
  </div>

  <div class="spot" style="background:#f5f8ff;border-color:#b3c6f5;border-left:4px solid #3b5bdb;">
    <div><span class="lab" style="color:#3b5bdb;">Q2 Earnings Kick Off — Banks Beat, IBM Cracks</span></div>
    <div class="mgrid" style="grid-template-columns:repeat(3,1fr);">
      ${mtile("Big banks","Beat","JPM, WFC, GS strong",G)}
      ${mtile("IBM","−22%","Weak prelim results",R)}
      ${mtile("Q2 consensus","~24%","YoY S&amp;P EPS growth",O)}
    </div>
    <div class="mnote">Earnings season opened with a split screen. The big banks delivered — JPMorgan, Wells Fargo, and Goldman Sachs all beat on strong trading and profits. But IBM cratered ~22% after preliminary results missed on software and infrastructure weakness, dragging the Dow. With Q2 S&amp;P earnings consensus near a lofty ~24% YoY (heavily concentrated in tech/AI), the bar is high — and single-name misses like IBM show how unforgiving the tape is when expectations are stretched. Source: CNBC / TheStreet, July 14, 2026.</div>
  </div>

  <div class="spot" style="background:var(--watch-bg);border-color:#f5d099;border-left:4px solid var(--watch-c);">
    <div><span class="lab" style="color:var(--watch-c);">CAPE Ratio (Shiller P/E)</span></div>
    <div class="mgrid" style="grid-template-columns:repeat(3,1fr);">
      ${mtile("Current CAPE","42.3x","2nd highest ever",R)}
      ${mtile("Historical avg (1881–)","17.3x","Current is 2.4× avg",GY)}
      ${mtile("Dot-com peak (1999)","44.2x","Only higher reading",O)}
    </div>
    <div class="mnote">With the index still near record highs, valuations remain at historic extremes. Even after the cool CPI eased the 10yr to 4.55%, the equity risk premium is thin (~+0.30%) — bonds stay competitive with stocks. Source: multpl.com</div>
  </div>`;
}

/* ---------- RENDER: YIELD CURVE SVG ---------- */
function renderChart(){
  const W=700,H=200,padL=40,padR=20,padT=10,padB=24;
  const plotW=W-padL-padR, plotBottom=H-padB, plotTop=padT;
  const yMin=3.0,yMax=5.5, n=yieldCurveData.length;
  const xAt=i=>padL+i*(plotW/(n-1));
  const yAt=v=>plotTop+(yMax-v)/(yMax-yMin)*(plotBottom-plotTop);
  const cur=yieldCurveData.map((d,i)=>`${xAt(i).toFixed(1)},${yAt(d.current).toFixed(1)}`).join(" ");
  const pri=yieldCurveData.map((d,i)=>`${xAt(i).toFixed(1)},${yAt(d.prior).toFixed(1)}`).join(" ");
  const dots=yieldCurveData.map((d,i)=>`<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(d.current).toFixed(1)}" r="3" fill="#3266ad" stroke="#fff" stroke-width="1"/>`).join("");
  const xlabels=yieldCurveData.map((d,i)=>`<text x="${xAt(i).toFixed(1)}" y="${H-8}" font-size="10" fill="#888" text-anchor="middle">${d.maturity}</text>`).join("");
  const yticks=[3.0,3.5,4.0,4.5,5.0,5.5].map(v=>`<text x="${padL-6}" y="${(yAt(v)+3).toFixed(1)}" font-size="10" fill="#888" text-anchor="end">${v.toFixed(1)}%</text>`).join("");
  const ref5=yAt(5.0).toFixed(1), ref45=yAt(4.5).toFixed(1);
  return `<div class="card chartcard">
    <div class="chart-h"><span class="sec-title">U.S. Treasury Yield Curve</span><span style="font-size:11px;color:#888;">July 14, 2026 — post-CPI</span></div>
    <div class="chart-sub">10–2 spread: +37 bps · 10yr at 4.55% · 2yr at ~4.18% · 30yr above 5% · Hover x-axis for maturity</div>
    <div class="chart-leg"><span style="color:#3266ad;">— Current</span><span style="color:#bbb;">-- 1yr ago (approx)</span></div>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="height:auto;display:block;" xmlns="http://www.w3.org/2000/svg">
      <line x1="${padL}" y1="${ref5}" x2="${W-padR}" y2="${ref5}" stroke="#e24b4b" stroke-dasharray="3 3" stroke-width="1"/>
      <text x="${W-padR}" y="${(ref5-3)}" font-size="10" fill="#e24b4b" text-anchor="end">5%</text>
      <line x1="${padL}" y1="${ref45}" x2="${W-padR}" y2="${ref45}" stroke="#f39c12" stroke-dasharray="3 3" stroke-width="1"/>
      <text x="${W-padR}" y="${(ref45-3)}" font-size="10" fill="#f39c12" text-anchor="end">4.5%</text>
      ${yticks}
      <polyline points="${pri}" fill="none" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5 3"/>
      <polyline points="${cur}" fill="none" stroke="#3266ad" stroke-width="2"/>
      ${dots}
      ${xlabels}
    </svg>
    <div class="curveread"><strong>Curve read:</strong> The cool CPI pulled the whole curve down a notch — 2yr −8bps to 4.18% (July hike off the table), 10yr −6bps to 4.55%. But the 30yr only eased 3bps and held above the red 5% line: the front end rallied on softer near-term inflation while the long end kept its premium against the oil-driven forward risk. Spread steady at +37 bps. PPI tomorrow.</div>
  </div>`;
}

/* ---------- RENDER: CALENDAR + GLOSSARY ---------- */
function renderCalendar(){
  return UPCOMING.map(ev=>{
    const p=PRIORITY[ev.priority];
    return `<div class="cal-row">
      <span class="cal-date">${esc(ev.date)}</span>
      <span class="cal-name">${esc(ev.name)}</span>
      <span class="cal-pri" style="background:${p.bg};color:${p.c};border-color:${p.b};">${p.label}</span>
    </div>`;
  }).join("")+`<div style="margin-top:8px;font-size:11px;color:#aaa;text-align:center;">Sources: BLS.gov · BEA.gov · federalreserve.gov · ISM · Census Bureau · CME FedWatch</div>`;
}
function renderGlossary(){
  const intro=`<div class="gloss-intro"><strong>Glossary:</strong> Every abbreviation used across the dashboard, grouped by area with a brief definition.</div>`;
  const grps=GLOSSARY.map(g=>`
    <div class="gloss-grp">
      <div class="gloss-cat">${esc(g.category)}</div>
      ${g.items.map(it=>`<div class="gloss-item"><div class="gloss-term">${esc(it.term)}</div><div class="gloss-def"><strong>${esc(it.full)}</strong> — ${esc(it.def)}</div></div>`).join("")}
    </div>`).join("");
  return intro+grps;
}

/* ---------- BUILD APP ---------- */
function build(){
  const counts=countAll();
  const html=`
    <div class="hdr">
      <div><div class="kicker">Economic Monitoring</div><div class="title">Signal Dashboard</div></div>
      <div class="rt"><div class="lbl">Last refreshed</div><div class="val">July 14, 2026 — 9:00 PM</div></div>
    </div>
    ${renderRead()}
    ${renderDecision(counts)}
    ${renderTiles(counts)}
    <div class="tabs">
      <button class="tabbtn active" data-tab="signals">Signals</button>
      <button class="tabbtn" data-tab="calendar">Calendar</button>
      <button class="tabbtn" data-tab="glossary">Glossary</button>
    </div>
    <div class="panel active" id="panel-signals">
      ${renderSpotlights()}
      ${renderSections()}
      ${renderChart()}
    </div>
    <div class="panel" id="panel-calendar">${renderCalendar()}</div>
    <div class="panel" id="panel-glossary">${renderGlossary()}</div>
    <div class="foot">
      CPI: BLS Jul 14 · Yields &amp; Fed odds: CNBC / CME FedWatch Jul 14 · Equity &amp; earnings: CNBC / TheStreet Jul 14 · Oil &amp; Iran: Yahoo / Bloomberg Jul 14 · VIX: Cboe (approx) · CAPE: multpl.com · Margin debt: FINRA
      <div class="disc">Static snapshot — for monitoring and educational use, not investment advice.</div>
    </div>`;
  document.getElementById("app").innerHTML=html;

  // Tab switching
  document.querySelectorAll(".tabbtn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".tabbtn").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-"+btn.dataset.tab).classList.add("active");
    });
  });
}
build();
</script>
</body>
</html>
