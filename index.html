const SIG = {
  clear: { bg: "#f0faf4", color: "#1e7c45", border: "#a8dfc0", dot: "#27ae60" },
  watch: { bg: "#fffbf0", color: "#b7650a", border: "#f5d99a", dot: "#f39c12" },

};

const PRIORITY = {
  critical: { bg: "#fff0f0", color: "#c0392b", border: "#f5aaaa", label: "CRITICAL" },
  high:     { bg: "#fffbf0", color: "#b7650a", border: "#f5d99a", label: "HIGH" },
  watch:    { bg: "#f0f0ff", color: "#3b5bdb", border: "#c5cdf5", label: "WATCH" },
};

function countAll() {
  const all = Object.values(SIGNALS).flat();
  return { clear: all.filter(r=>r.signal==="clear").length, watch: all.filter(r=>r.signal==="watch").length, alert: all.filter(r=>r.signal==="alert").length, total: all.length };
}

function Badge({ type }) {
  const s = SIG[type];
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:4, background:s.bg, color:s.color, border:`1px solid ${s.border}`, fontSize:10, fontWeight:700, letterSpacing:".06em", padding:"2px 7px", borderRadius:4, whiteSpace:"nowrap" }}>
      <span style={{ width:6, height:6, borderRadius:"50%", background:s.dot, flexShrink:0 }} />{type.toUpperCase()}
    </span>
  );
}

function Section({ title, rows, defaultOpen=false }) {
  const [open, setOpen] = useState(defaultOpen);
  const [hovered, setHovered] = useState(null);
  const c = { clear: rows.filter(r=>r.signal==="clear").length, watch: rows.filter(r=>r.signal==="watch").length, alert: rows.filter(r=>r.signal==="alert").length };
  const pill = (bg, color, border) => ({ fontSize:11, borderRadius:4, padding:"1px 7px", fontWeight:700, background:bg, color, border:`1px solid ${border}` });
  return (
    <div style={{ marginBottom:8, background:"#fff", border:"1px solid #dee2e6", borderRadius:8, overflow:"hidden" }}>
      <button onClick={()=>setOpen(!open)} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:"#f8f9fa", border:"none", borderBottom:open?"1px solid #dee2e6":"none", cursor:"pointer", fontFamily:"inherit" }}>
        <span style={{ fontWeight:700, fontSize:12, letterSpacing:".05em", color:"#444", textTransform:"uppercase" }}>{title}</span>
        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
          {c.alert>0 && <span style={pill("#fff0f0","#c0392b","#f5aaaa")}>{c.alert} 🔴</span>}
          {c.watch>0 && <span style={pill("#fffbf0","#b7650a","#f5d99a")}>{c.watch} 🟡</span>}
          {c.clear>0 && <span style={pill("#f0faf4","#1e7c45","#a8dfc0")}>{c.clear} 🟢</span>}
          <span style={{ color:"#aaa", fontSize:16, marginLeft:4, display:"inline-block", transform:open?"rotate(90deg)":"none", transition:"transform .2s" }}>›</span>
        </div>
      </button>
      {open && (
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid #dee2e6" }}>
                {["Indicator","Current","Prev (7/13)","Direction","Signal"].map(h=>(
                  <th key={h} style={{ textAlign:"left", padding:"6px 12px", color:"#888", fontWeight:600, fontSize:11, whiteSpace:"nowrap", background:"#f8f9fa", textTransform:"uppercase", letterSpacing:".04em" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row,i) => (
                <tr key={i} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}
                  style={{ borderBottom:i<rows.length-1?"1px solid #f1f3f5":"none", background:hovered===i?"#f8f9fa":"#fff", cursor:"default" }}>
                  <td style={{ padding:"8px 12px", color:"#222", fontWeight:500 }}>
                    {row.name}
                    {row.isUpdated && <span style={{ marginLeft:6, fontSize:9, background:"#e24b4b", color:"#fff", padding:"1px 5px", borderRadius:3, fontWeight:700 }}>UPDATED</span>}
                    {hovered===i && (
                      <div style={{ fontSize:10, color:"#aaa", marginTop:2 }}>
                        Watch: {row.watch}
                        {row.source && <span style={{ display:"block", marginTop:1 }}>Source: {row.source}</span>}
                      </div>
                    )}
                  </td>
                  <td style={{ padding:"8px 12px", color:"#1a1a2e", fontWeight:700, whiteSpace:"nowrap" }}>{row.value}</td>
                  <td style={{ padding:"8px 12px", color:"#888", fontSize:12, whiteSpace:"nowrap" }}>{row.prev}</td>
                  <td style={{ padding:"8px 12px", color:"#555", fontSize:12, whiteSpace:"nowrap" }}>{row.dir}</td>
                  <td style={{ padding:"8px 12px" }}><Badge type={row.signal} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Spotlight({ borderColor, bg, labelColor, label, badge, children, note }) {
  return (
    <div style={{ padding:"11px 14px", borderRadius:8, marginBottom:10, background:bg, border:`1px solid ${borderColor}`, borderLeft:`4px solid ${labelColor}` }}>
      <div style={{ marginBottom:8 }}>
        <span style={{ fontSize:12, fontWeight:700, textTransform:"uppercase", letterSpacing:".06em", color:labelColor }}>{label}</span>
        {badge && <span style={{ fontSize:9, background:"#e24b4b", color:"#fff", padding:"1px 6px", borderRadius:3, fontWeight:700, marginLeft:8, verticalAlign:"middle" }}>{badge}</span>}
      </div>
      {children}
      {note && <div style={{ marginTop:8, fontSize:11, color:"#666", lineHeight:1.5 }}>{note}</div>}
    </div>
  );
}

function MetricTile({ label, value, sub, valueColor="#c0392b" }) {
  return (
    <div style={{ background:"#fff", borderRadius:6, padding:"9px 11px", border:"1px solid #e9ecef" }}>
      <div style={{ fontSize:10, color:"#888", marginBottom:3 }}>{label}</div>
      <div style={{ fontSize:20, fontWeight:700, color:valueColor, lineHeight:1 }}>{value}</div>
      {sub && <div style={{ fontSize:10, color:"#888", marginTop:3 }}>{sub}</div>}
    </div>
  );
}

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:"#fff", border:"1px solid #dee2e6", borderRadius:6, padding:"8px 12px", fontSize:12, boxShadow:"0 2px 8px rgba(0,0,0,.08)" }}>
      <div style={{ fontWeight:700, color:"#444", marginBottom:4 }}>{label}</div>
      {payload.map((p,i) => <div key={i} style={{ color:p.color, marginBottom:2 }}>{p.name}: <strong>{p.value.toFixed(2)}%</strong></div>)}
    </div>
  );
};
